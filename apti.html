<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AptiTest - Per-Question Metadata</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .option-btn:disabled { cursor: not-allowed; opacity: 0.9; }
        .correct { background-color: #10b981 !important; border-color: #34d399 !important; font-weight: bold; }
        .wrong { background-color: #ef4444 !important; border-color: #f87171 !important; }
        .diff-Easy { color: #34d399; }
        .diff-Medium { color: #fbbf24; }
        .diff-Hard { color: #f87171; }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen p-4 md:p-8">
    <div class="max-w-2xl mx-auto">
        
        <div class="flex justify-between items-center mb-6 bg-slate-800/80 p-5 rounded-3xl border border-slate-700 shadow-xl">
            <div class="flex gap-4 items-center">
                <div class="h-10 w-10 rounded-full bg-slate-900 flex items-center justify-center border border-slate-700 text-xs font-bold text-blue-400" id="batch-circle">1</div>
                <div>
                    <div id="q-category-display" class="text-[10px] font-black text-slate-500 uppercase tracking-tighter">CATEGORY</div>
                    <div id="q-difficulty-display" class="text-sm font-bold uppercase tracking-widest">DIFFICULTY</div>
                </div>
            </div>
            <div class="text-right">
                <span id="step-label" class="text-[10px] font-mono text-slate-400">Step 1/3</span>
                <div class="flex gap-1 mt-1 justify-end" id="step-dots">
                    <div class="w-1.5 h-1.5 rounded-full bg-slate-600"></div>
                    <div class="w-1.5 h-1.5 rounded-full bg-slate-600"></div>
                    <div class="w-1.5 h-1.5 rounded-full bg-slate-600"></div>
                </div>
            </div>
        </div>

        <div id="main-card" class="bg-slate-800 border border-slate-700 rounded-[2.5rem] p-8 md:p-12 shadow-2xl">
            <h2 id="question-body" class="text-xl md:text-2xl font-medium leading-snug mb-10 text-slate-100">
                Syncing with local server...
            </h2>
            
            <div id="options-grid" class="grid grid-cols-1 gap-4"></div>

            <div id="explanation-panel" class="hidden mt-10 pt-10 border-t border-slate-700/50">
                <div class="bg-slate-900/50 p-6 rounded-2xl border border-slate-700 mb-8">
                    <span class="text-[10px] font-bold text-blue-500 uppercase">Analysis</span>
                    <p id="explanation-text" class="text-sm text-slate-300 italic mt-2 leading-relaxed"></p>
                </div>
                <button onclick="nextQuestion()" class="w-full bg-blue-600 hover:bg-blue-500 py-5 rounded-2xl font-black text-sm uppercase tracking-widest transition-all shadow-lg shadow-blue-900/40">
                    Next Question →
                </button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "http://127.0.0.1:8000/api/v1/assessments/aptitude";
let masterPool = null;
let currentBatch = [];
let batchNumber = 1;
let stepIdx = 0;

// CRITICAL: Independent difficulty tracking
let catLevels = {
    "Logical Reasoning": "Easy",
    "Quantitative Aptitude": "Easy",
    "Verbal Ability": "Easy"
};

async function startEngine() {
    try {
        const res = await fetch(`${API_BASE}/generate/assessment-pool?target_grade=6-8`);
        const data = await res.json();
        masterPool = data.pool;
        loadNextBatch();
    } catch (e) {
        document.getElementById('question-body').innerText = "Connection Failed. Check 127.0.0.1:8000";
    }
}

function loadNextBatch() {
    currentBatch = [];
    const categories = ["Logical Reasoning", "Quantitative Aptitude", "Verbal Ability"];
    
    categories.forEach(cat => {
        // Find the current difficulty level for THIS specific category
        let targetDiff = catLevels[cat];
        
        let list = masterPool[cat][targetDiff];
        
        // Fallback logic if a specific bucket is empty
        if (list.length === 0) {
            console.warn(`Bucket empty for ${cat} - ${targetDiff}. Falling back to Medium.`);
            list = masterPool[cat]['Medium'];
        }

        if (list.length > 0) {
            currentBatch.push(list.pop());
        }
    });

    stepIdx = 0;
    render();
}

function render() {
    const q = currentBatch[stepIdx];
    
    // Update UI Labels
    const diffEl = document.getElementById('q-difficulty-display');
    diffEl.innerText = q.difficulty;
    diffEl.className = `text-sm font-bold uppercase tracking-widest diff-${q.difficulty}`;
    
    document.getElementById('q-category-display').innerText = q.category;
    document.getElementById('batch-circle').innerText = batchNumber;
    document.getElementById('step-label').innerText = `Step ${stepIdx + 1} of 3`;
    document.getElementById('question-body').innerText = q.question;
    document.getElementById('explanation-panel').classList.add('hidden');
    
    // Update Dots
    const dots = document.getElementById('step-dots').children;
    for(let i=0; i<3; i++) {
        dots[i].className = i <= stepIdx ? "w-1.5 h-1.5 rounded-full bg-blue-500" : "w-1.5 h-1.5 rounded-full bg-slate-600";
    }

    const container = document.getElementById('options-grid');
    container.innerHTML = '';
    q.options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = "option-btn p-5 text-left bg-slate-700/30 hover:bg-slate-700 border border-slate-600 rounded-2xl transition-all text-sm font-medium";
        btn.innerText = opt;
        btn.onclick = () => validate(opt[0], q.answer, q.explanation, q.category, q.difficulty);
        container.appendChild(btn);
    });
}

function validate(selected, correct, explanation, category, difficulty) {
    const isCorrect = (selected === correct);
    
    // Update the difficulty for the NEXT time this category is seen
    updateIsolatedDifficulty(category, difficulty, isCorrect);

    document.getElementById('explanation-text').innerText = explanation;
    document.getElementById('explanation-panel').classList.remove('hidden');
    
    const btns = document.getElementsByClassName('option-btn');
    for (let b of btns) {
        b.disabled = true;
        if (b.innerText.startsWith(correct)) b.classList.add('correct');
        if (b.innerText.startsWith(selected) && !isCorrect) b.classList.add('wrong');
    }
}

function updateIsolatedDifficulty(cat, currentDiff, isCorrect) {
    if (isCorrect) {
        // Move UP
        if (currentDiff === 'Easy') catLevels[cat] = 'Medium';
        else if (currentDiff === 'Medium') catLevels[cat] = 'Hard';
    } else {
        // Move DOWN
        if (currentDiff === 'Hard') catLevels[cat] = 'Medium';
        else if (currentDiff === 'Medium') catLevels[cat] = 'Easy';
    }
    console.log(`Updated ${cat} level to: ${catLevels[cat]}`);
}

function nextQuestion() {
    stepIdx++;
    if (stepIdx < 3) {
        render();
    } else {
        batchNumber++;
        if (batchNumber <= 15) {
            loadNextBatch();
        } else {
            alert("Assessment Complete! You've finished all 15 batches.");
        }
    }
}

startEngine();
    </script>
</body>
</html>
